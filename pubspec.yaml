name: k_photo
description: "K-Photo: Privacy-first photo gallery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Database (Drift/SQLite)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Network & State
  webdav_client: ^1.2.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.3
  share_plus: ^10.1.3
  open_filex: ^4.5.0
  
  # UI
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.1
  intl: ^0.19.0
  image: ^4.1.3
  exif: ^3.1.5
  flutter_sticky_header: ^0.8.0
  
  # AI
  google_mlkit_image_labeling: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Generators
  drift_dev: ^2.16.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "K-Photo_Icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
